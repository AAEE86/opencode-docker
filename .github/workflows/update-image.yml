name: Update Docker Image

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.compare.outputs.needs_update }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get latest release
        id: release
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.getLatestRelease({
              owner: 'anomalyco',
              repo: 'opencode'
            });
            const tag = data.tag_name;
            const version = tag.startsWith('v') ? tag.slice(1) : tag;
            core.setOutput('version', version);

      - name: Get current image versions
        id: current
        run: |
          TAGS=$(gh api /users/pilinux/packages/container/opencode/versions 2>/dev/null | jq -r 'if type == "array" then .[].metadata.container.tags[] else empty end' | sort -V | tail -1 || echo "")
          echo "current_version=$TAGS" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare versions
        id: compare
        run: |
          RELEASE_VERSION="${{ steps.release.outputs.version }}"
          CURRENT_VERSION="${{ steps.current.outputs.current_version }}"
          if [ -z "$CURRENT_VERSION" ] || [ "$(printf '%s\n' "$RELEASE_VERSION" "$CURRENT_VERSION" | sort -V | head -n1)" != "$RELEASE_VERSION" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.needs_update == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Prepare
        id: prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "platform_pair=${platform//\//-}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pilinux/opencode

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/pilinux/opencode,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ steps.prepare.outputs.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [check, build]
    if: needs.check.outputs.needs_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/pilinux/opencode:${{ needs.check.outputs.version }} \
            -t ghcr.io/pilinux/opencode:latest \
            $(printf 'ghcr.io/pilinux/opencode@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/pilinux/opencode:${{ needs.check.outputs.version }}
